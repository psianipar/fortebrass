name: Automated YouTube Feed Sync

on:
  schedule:
    - cron: '0 13 * * *' # Fires automatically every day at midnight UTC+13 (20:00 WIB JAKARTA)
  workflow_dispatch: # Allows you to press a button to force an instant sync

jobs:
  sync-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the automated runner to save updates back to your repo
      
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Initialize Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run Extraction Script
      run: python fetch_videos.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add videos.json
        if ! git diff-index --quiet HEAD; then
          git commit -m "auto: update youtube payload [skip ci]"
          git push
        else
          echo "No video catalog changes discovered."
        fi
